<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RITUAL</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash">
        <div class="splash-content">
            <h1 class="splash-title">Ritual</h1>
        </div>
    </div>

    <!-- Login Screen -->
    <div id="login" class="login-container hidden">
        <div class="login-card">
            <h1>Ritual</h1>
            <p>4-Tier MCP Memory Portal</p>
            
            <button id="btn-github-login" class="btn-github">
                <svg height="18" width="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
                </svg>
                Continue with GitHub
            </button>
            
            <div id="login-hint" class="login-hint hidden">
                <p>OAuth not configured</p>
                <small>Set GITHUB_CLIENT_SECRET</small>
                <br><br>
                <button id="btn-skip-login" class="btn-secondary">Continue without login</button>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="app-container hidden">
        <!-- Header -->
        <header class="ritual-header">
            <span class="header-title">Ritual</span>
            <nav class="header-nav">
                <button class="nav-btn active" data-view="dashboard">Dashboard</button>
                <button class="nav-btn" data-view="memory">Memory</button>
                <button class="nav-btn" data-view="engineer">Engineer</button>
                <button class="nav-btn" data-view="keys">Keys</button>
                <button class="nav-btn" data-view="models">Models</button>
            </nav>
            <div class="header-right">
                <button class="nav-btn" onclick="location.reload()">↻</button>
            </div>
        </header>

        <!-- Dashboard View -->
        <div id="view-dashboard" class="view">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="stat-tier-0">0</div>
                    <div class="stat-label">Personality</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-tier-1">0</div>
                    <div class="stat-label">Context</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-tier-2">0</div>
                    <div class="stat-label">Frequent</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-tier-3">0</div>
                    <div class="stat-label">Archive</div>
                </div>
            </div>
            
            <div class="quick-actions">
                <button class="action-btn" id="btn-new-memory-dash">
                    <span>+</span> New Memory
                </button>
                <button class="action-btn" id="btn-add-key-dash">
                    <span>⚿</span> Add API Key
                </button>
                <button class="action-btn" id="btn-browse-models-dash">
                    <span>◈</span> Browse Models
                </button>
            </div>
        </div>

        <!-- Memory View -->
        <div id="view-memory" class="view hidden">
            <div class="filter-chips">
                <button class="filter-chip active" data-tier="">All</button>
                <button class="filter-chip" data-tier="0">Personality</button>
                <button class="filter-chip" data-tier="1">Context</button>
                <button class="filter-chip" data-tier="2">Frequent</button>
                <button class="filter-chip" data-tier="3">Archive</button>
                <button class="filter-chip" id="btn-new-memory" style="margin-left: auto;">+ New</button>
            </div>
            <div id="memories-grid" class="memories-grid"></div>
        </div>

        <!-- Engineer View -->
        <div id="view-engineer" class="view hidden">
            <div class="card">
                <h3 class="mb-4">Prompt Engineer</h3>
                <div id="engineer-chat" style="min-height: 200px; margin-bottom: 16px;"></div>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="engineer-input" placeholder="Ask the prompt engineer...">
                    <button class="btn-secondary" id="btn-engineer-send">Send</button>
                </div>
            </div>
        </div>

        <!-- Keys View -->
        <div id="view-keys" class="view hidden">
            <div class="card mb-4">
                <h3 class="mb-4">API Keys</h3>
                <div id="keys-list" class="keys-list"></div>
                <button class="btn-secondary" id="btn-add-key" style="margin-top: 16px;">+ Add Key</button>
            </div>
        </div>

        <!-- Models View -->
        <div id="view-models" class="view hidden">
            <div class="card mb-4">
                <h3 class="mb-4">Model Discovery</h3>
                <div id="models-grid" class="models-grid"></div>
            </div>
        </div>

        <!-- Footer -->
        <footer style="margin-top: auto; padding-top: 24px; text-align: center;">
            <p class="text-muted text-sm">RITUAL v1.0 — 4-Tier MCP Memory Portal</p>
        </footer>
    </div>

    <!-- Memory Modal -->
    <div id="memory-modal" class="modal hidden">
        <div class="modal-header">
            <h3 id="memory-modal-title">New Memory</h3>
            <button class="close-btn" onclick="hideModal()">×</button>
        </div>
        <div class="form-group">
            <label>Key</label>
            <input type="text" id="memory-key" placeholder="e.g., preferred_model">
        </div>
        <div class="form-group">
            <label>Content</label>
            <textarea id="memory-content" rows="4" placeholder="Memory content..."></textarea>
        </div>
        <div class="form-group">
            <label>Tier</label>
            <select id="memory-tier">
                <option value="0">Personality</option>
                <option value="1" selected>Context</option>
                <option value="2">Frequent</option>
                <option value="3">Archive</option>
            </select>
        </div>
        <div class="form-group">
            <label>Tags (comma separated)</label>
            <input type="text" id="memory-tags" placeholder="preference, style, project">
        </div>
        <div style="display: flex; gap: 8px; justify-content: flex-end;">
            <button class="btn-secondary" onclick="hideModal()">Cancel</button>
            <button class="btn-github" id="btn-save-memory">Save</button>
        </div>
    </div>

    <!-- Key Modal -->
    <div id="key-modal" class="modal hidden">
        <div class="modal-header">
            <h3>Add API Key</h3>
            <button class="close-btn" onclick="hideModal()">×</button>
        </div>
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="key-name" placeholder="e.g., OpenAI">
        </div>
        <div class="form-group">
            <label>Provider</label>
            <select id="key-provider">
                <option value="openai">OpenAI</option>
                <option value="anthropic">Anthropic</option>
                <option value="huggingface">HuggingFace</option>
                <option value="civitai">CivitAI</option>
                <option value="ollama">Ollama</option>
            </select>
        </div>
        <div class="form-group">
            <label>API Key</label>
            <input type="password" id="key-value" placeholder="sk-...">
        </div>
        <div style="display: flex; gap: 8px; justify-content: flex-end;">
            <button class="btn-secondary" onclick="hideModal()">Cancel</button>
            <button class="btn-github" id="btn-save-key">Save</button>
        </div>
    </div>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="modal-overlay hidden" onclick="hideModal()"></div>

    <script src="/static/app.js"></script>
</body>
</html>
